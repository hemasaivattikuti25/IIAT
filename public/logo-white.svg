<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <!-- Transparent Background -->
  
  <!-- Left Emblem -->
  <g transform="translate(30, 15) scale(0.9)">
    <!-- Outer White Circle -->
    <circle cx="120" cy="120" r="110" fill="none" stroke="#ffffff" stroke-width="6"/>
    <circle cx="120" cy="120" r="100" fill="none" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Inner Circle (White/Transparent) -->
    <circle cx="120" cy="120" r="90" fill="rgba(255,255,255,0.1)" stroke="#ffffff" stroke-width="4"/>
    
    <!-- Gear Teeth (Simplified) -->
    <path d="M 120 30 L 130 15 L 140 32 M 210 120 L 225 110 L 208 100" stroke="#ffffff" stroke-width="4" fill="none"/>
    
    <!-- IIAT Monogram inside circle -->
    <text x="120" y="150" font-family="serif" font-size="80" font-weight="bold" fill="#ffffff" text-anchor="middle">IA</text>
  </g>
  
  <!-- Text Right Side -->
  <text x="300" y="140" font-family="serif" font-size="140" font-weight="bold" fill="#ffffff">IIAT</text>
  
  <!-- Divider -->
  <line x1="280" y1="20" x2="280" y2="230" stroke="#ffffff" stroke-width="4"/>
  <line x1="300" y1="160" x2="750" y2="160" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Subtext -->
  <text x="300" y="195" font-family="serif" font-size="28" fill="#ffffff" font-weight="bold">INDIAN INSTITUTE OF</text>
  <text x="300" y="230" font-family="serif" font-size="28" fill="#ffffff" font-weight="bold">ADVANCED TECHNOLOGIES</text>
</svg>
